server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # nginx 1.21+ ships application/wasm in the default mime.types at the
    # http{} level, so we inherit it here without redeclaring (a types{}
    # block at server level would wipe out ALL inherited mappings).

    # Gzip text assets (main.dart.js compresses ~5x).
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css text/javascript
                      application/javascript application/json
                      application/wasm image/svg+xml;

    # Flutter service worker must not be cached by the browser, otherwise
    # users get stuck on stale versions after you redeploy.
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Hashed Flutter assets can be cached aggressively.
    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|svg|woff2?|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # SPA fallback: unknown paths return index.html so Flutter's router handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
